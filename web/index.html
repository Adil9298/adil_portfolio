<!DOCTYPE html>
<html>
<head>

  <meta charset="UTF-8">

  <meta name="description" content="Portfolio of a Flutter Developer and Data Science Enthusiast showcasing scalable mobile applications, modern UI/UX designs, backend integrations, and data-driven solutions.">

  <meta property="og:title" content="Mohammed Adil | Flutter Developer & Data Scientist" />

        content="Portfolio of Mohammed Adil showcasing premium Flutter applications, scalable systems, AI solutions and futuristic UI experiences." />

  <meta property="og:type" content="website" />

  <meta property="og:url"
        content="https://adil-portfolio.web.app/" />

  <meta property="og:image"
        content="https://adil-portfolio.web.app/ma_icon.png" />

  <meta property="og:image:width"

  <meta property="og:image:height"
        content="630" />

        content="Mohammed Adil's Portfolio" />

  <meta name="twitter:card"
        content="summary_large_image" />

  <meta name="twitter:title"
        content="Mohammed Adil | Flutter Developer & Data Scientist" />

  <meta name="twitter:description"

  <meta name="apple-mobile-web-app-title" content="Adil's Portfolio">
